      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_PROD_CLIENT_SECRET }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_PROD_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Set up kubelogin for non-interactive login
        run: |
          curl -LO https://github.com/Azure/kubelogin/releases/download/v0.0.9/kubelogin-linux-amd64.zip
          sudo unzip -jo kubelogin-linux-amd64.zip -d /usr/local/bin
          rm -f kubelogin-linux-amd64.zip
          kubelogin --version

      - name: Setting Image and Release Name
        id: set_vars  # <--- IMPORTANT: Add this ID
        run: |
          REPO_NAME=$(echo "${{ inputs.repository_name }}" | tr '[:upper:]' '[:lower:]')
          ENV_NAME="${{ inputs.environment }}"
          
          # Set Release Name
          if [[ "${ENV_NAME}" == "prod" || "${ENV_NAME}" == "production" ]]; then
             RELEASE_NAME="release-${REPO_NAME}"
          else
             RELEASE_NAME="release-${REPO_NAME}-${ENV_NAME}"
          fi
          
          IMAGE_NAME="${REPO_NAME}"

          # Export to GITHUB_ENV (for this job)
          echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "ENVIRONMENT_NAME=${ENV_NAME}" >> $GITHUB_ENV
          
          # Export to GITHUB_OUTPUT (for other jobs)
          echo "image_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          

