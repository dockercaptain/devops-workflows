  fetch_vault_secrets:
    name: "Fetch Dynamic Secrets from Vault"
    runs-on: prod
    environment: ${{ inputs.environment }}
    needs:
       - deploy_to_k8
       - deploy_to_prod
    if: |
      always() &&
      inputs.run_ct == true &&
      (needs.deploy_to_k8.result == 'success' || needs.deploy_to_prod.result == 'success')
    outputs:
      app_secrets: ${{ steps.get_secrets.outputs.app_secrets }}
    steps: 
      - name: Debug Image Name
        run: |
          # Accessing the output from the needed job
          echo "DEBUG → IMAGE_NAME='${{ needs.deploy_to_k8.outputs.image_name || needs.deploy_to_prod.outputs.image_name }}'"
  
      - name: Install Vault CLI and jq
        id: get_secrets
        shell: bash
        env:
          VAULT_SKIP_VERIFY: "true"
          VAULT_TOKEN: ${{ inputs.environment == 'prod' && secrets.VAULT_ROOT_TOKEN_ENT_PROD || secrets.VAULT_ROOT_TOKEN_ENT_NPROD }}
          IMAGE_NAME: ${{ inputs.environment == 'prod' && needs.deploy_to_k8.outputs.image_name || format('{0}-{1}', needs.deploy_to_prod.outputs.image_name, inputs.environment) }}
          VAULT_ADDR: ${{ inputs.environment == 'prod' && 'https://vault.quantautomate.com' || 'https://vault.wescodevops.com' }}
          VAULT_MOUNT: ${{ inputs.environment }}
        run: |
          # Install tools only if missing (skip slow apt update)
          echo "Checking required tools..."
          NEED_INSTALL=false
          for tool in jq unzip curl; do
            if ! command -v $tool &>/dev/null; then
              NEED_INSTALL=true
              break
            fi
          done
          if [ "$NEED_INSTALL" = true ]; then
            echo "Installing missing tools..."
            sudo apt update && sudo apt install -y jq unzip curl
          else
            echo "✅ jq, unzip, curl already installed — skipping apt update"
          fi
  
          VAULT_VERSION="1.15.4"
          ZIP_FILE="vault_${VAULT_VERSION}_linux_amd64.zip"

          if ! command -v vault &>/dev/null || [ "$(vault --version 2>/dev/null | grep -oP '\d+\.\d+\.\d+')" != "$VAULT_VERSION" ]; then
            echo "Downloading Vault CLI version $VAULT_VERSION..."
            curl -fsSL -o /tmp/${ZIP_FILE} https://releases.hashicorp.com/vault/${VAULT_VERSION}/${ZIP_FILE}
            echo "Installing Vault CLI..."
            sudo unzip -o /tmp/${ZIP_FILE} -d /usr/local/bin
            sudo chmod +x /usr/local/bin/vault
          else
            echo "✅ Vault $VAULT_VERSION already installed — skipping download"
          fi
  
          echo "Vault installed at: $(which vault)"
          vault --version
          echo "Token length: ${#VAULT_TOKEN}"
          
          echo "Using VAULT_MOUNT=$VAULT_MOUNT, IMAGE_NAME=$IMAGE_NAME"
          # Fetch secrets from vault
          VAULT_PATH="${IMAGE_NAME}"
          echo "Fetching secrets from mount=$VAULT_MOUNT path=$VAULT_PATH"
          
          VAULT_RAW=$(vault kv get -mount=$VAULT_MOUNT -format=json "$VAULT_PATH" 2>&1) || {
            echo "❌ vault kv get failed. Output:"
            echo "$VAULT_RAW"
            echo "Check: Does mount '$VAULT_MOUNT' and path '$VAULT_PATH' exist in vault at $VAULT_ADDR?"
            exit 1
          }
          
          SECRETS_JSON=$(echo "$VAULT_RAW" | jq -c '.data.data')
          echo "✅ Secrets fetched successfully"
          echo "::add-mask::$SECRETS_JSON"

          # Encode and pass to next workflow
          ENCODED_SECRETS=$(echo "$SECRETS_JSON" | base64 | tr -d '\n')
          echo "app_secrets=$ENCODED_SECRETS" >> $GITHUB_OUTPUT

