name: CD

on:
  workflow_call:
    inputs:
      repository_name:
        description: "Target Repository"
        type: string
        required: true
      repository_ref:
        description: "Target Branch/Ref"
        type: string
        required: true
      tag:
        description: "Tag for the deployment"
        type: string
        required: true
      environment:
        description: "Environment to deploy to"
        type: string
        required: true
      organization:
        description: "Organisation"
        type: string
        required: false
        default: "ORG1"
      cluster_name:
        description: "AKS Cluster Name"
        type: string
        required: false
      cluster_resource_group:
        description: "AKS Cluster Resource Group"
        type: string
        required: false
      deployment_url:
        description: "Deployment URL/Hostname"
        type: string
        required: false
        default: ""
      helmInput:
        description: "Additional Helm arguments"
        type: string
        required: false
        default: ""
      gatewayName:
        description: "Update GW if needed"
        type: string
        required: false
        default: ""
      run_ct:
        description: "User choice to trigger CT"
        type: boolean
        required: false
        default: false
    secrets:
      REGISTRY_LOGIN_SERVER:
        required: true
      GH_PAGES_USERNAME:
        required: true
      CT_GH_PAT:
        required: false
      AZURE_CLIENT_ID:
        required: true
      AZURE_CLIENT_SECRET:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
  workflow_dispatch:
    inputs:
      repository_name:
        description: "Target Repository"
        type: string
        required: true
      repository_ref:
        description: "Target Branch/Ref"
        type: string
        required: true
      tag:
        description: "Tag for the deployment"
        type: string
        required: true
      environment:
        description: "Environment to deploy to"
        type: string
        required: true
      cluster_name:
        description: "AKS Cluster Name"
        type: string
        required: true
      cluster_resource_group:
        description: "AKS Cluster Resource Group"
        type: string
        required: true
      deployment_url:
        description: "Deployment URL/Hostname"
        type: string
        required: false
      helmInput:
        description: "Additional Helm arguments"
        type: string
        required: false
      gatewayName:
        description: "Update GW if needed"
        type: string
        required: false
        default: ""
      run_ct:
        description: "User choice to trigger CT"
        type: boolean
        required: false
        default: false

jobs:
  deploy_to_k8:
    name: "Deployment to kubernetes cluster"
    outputs:
      image_name: ${{ steps.set_vars.outputs.image_name }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
    runs-on: prod
    environment: ${{ inputs.environment }}
    if: inputs.environment != 'prod' && inputs.environment != 'production'
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Set up kubelogin for non-interactive login
        run: |
          curl -LO https://github.com/Azure/kubelogin/releases/download/v0.0.9/kubelogin-linux-amd64.zip
          sudo unzip -jo kubelogin-linux-amd64.zip -d /usr/local/bin
          rm -f kubelogin-linux-amd64.zip
          kubelogin --version

      - name: Setting Image and Release Name
        id: set_vars
        run: |
          REPO_NAME="${{ inputs.repository_name }}"
          TAG_NAME="${{ inputs.tag }}"
          ENV_NAME="${{ inputs.environment }}"

          # Ensure lower case
          REPO_NAME=$(echo ${REPO_NAME} | tr '[:upper:]' '[:lower:]')
          
          # Set Release Name logic
          if [[ "${ENV_NAME}" == "prod" || "${ENV_NAME}" == "production" ]]; then
             RELEASE_NAME="release-${REPO_NAME}"
          else
             RELEASE_NAME="release-${REPO_NAME}-${ENV_NAME}"
          fi
          
          # Set Image Name (Just the repo name, tag is separate)
          # Note: User requested "image_name should be repo-name:input_tag"
          # Depending on how IMAGE_NAME is used:
          # If used for docker push/pull: repo:tag
          # If used for helm image.repository: just repo (and image.tag is set separately)
          # Current helm command uses separate image.repository and image.tag
          IMAGE_NAME="${REPO_NAME}"

          echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "ENVIRONMENT_NAME=${ENV_NAME}" >> $GITHUB_ENV
          echo "image_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
        env:
          BRANCH_NAME: ${{ inputs.repository_ref }}

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ env.AZURE_CLIENT_ID }}","clientSecret":"${{ env.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ env.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ env.AZURE_TENANT_ID }}"}'

      - name: Check out code
        uses: actions/checkout@v4
        with:
          repository: "${{ inputs.organization }}/${{ inputs.repository_name }}"
          # token: "${{ secrets.PAT_TOKEN }}"
          ref: "${{ inputs.repository_ref }}"

      - name: Setting up aks context
        run: |
          az aks get-credentials --resource-group "${{ vars.cluster_resource_group }}" --name "${{ vars.cluster_name }}" --admin
          kubelogin convert-kubeconfig -l spn --client-id "${{ env.AZURE_CLIENT_ID }}"  --client-secret "${{ env.AZURE_CLIENT_SECRET }}"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        id: install
      
      - name: Add Helm repository
        run: |
          helm repo add charty "https://raw.githubusercontent.com/ORG1/charty/gh-pages/" --username ${{ secrets.GH_PAGES_USERNAME }} --password ${{ secrets.CT_GH_PAT }}
      
      - name: Update Helm repositories
        run: |
          helm repo update
      
      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.RELEASE_NAME }} charty/digital-platform-deployer-helm \
            --namespace actions-runner-system \
            --create-namespace \
            -f ./configs/values.yml \
            --set image.repository=${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ inputs.tag }} \
            --set environment=${{ env.ENVIRONMENT_NAME }} \
            --set targetBranch=${{ inputs.repository_ref }} \
            --set hostname=${{ vars.deployment_url }} \
            --set clusterName=${{ vars.cluster_name }} \
            --set gatewayName=${{ vars.GATEWAY_NAME }} \
            --server-side=false
    
